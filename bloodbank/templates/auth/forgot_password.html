{% extends "base.html" %}

{% block title %}Forgot Password | LifeDrop{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-panel">
        <div class="section-heading">
            <p class="eyebrow">Account recovery</p>
            <h1>Reset password</h1>
            <p class="muted">Enter your registered email and LifeDrop will create a secure one-time reset link.</p>
        </div>
        <form method="post" class="form-grid">
            <label>
                Registered email
                <input type="email" name="email" required autocomplete="email">
            </label>
            <button class="button button-primary" type="submit">Send reset link</button>
        </form>
        <p class="muted auth-switch">Remembered it? <a href="{{ url_for('main.login') }}">Back to login</a></p>
    </div>
</section>
{% endblock %}
