{% extends "base.html" %}

{% block title %}Set New Password | LifeDrop{% endblock %}

{% block content %}
<section class="auth-layout">
    <div class="auth-panel">
        <div class="section-heading">
            <p class="eyebrow">Secure reset</p>
            <h1>Set new password</h1>
            <p class="muted">Choose a new password with at least 6 characters.</p>
        </div>
        <form method="post" class="form-grid">
            <label>
                New password
                <span class="password-control">
                    <input type="password" name="password" required minlength="6" autocomplete="new-password" data-password-strength data-match-source>
                    <button type="button" class="password-toggle" data-toggle-password>Show</button>
                </span>
                <span class="password-strength" data-strength-label>Strength: waiting</span>
            </label>
            <label>
                Confirm password
                <span class="password-control">
                    <input type="password" name="confirm_password" required minlength="6" autocomplete="new-password" data-match-target>
                    <button type="button" class="password-toggle" data-toggle-password>Show</button>
                </span>
                <span class="password-match" data-match-label>Passwords must match.</span>
            </label>
            <button class="button button-primary" type="submit">Reset password</button>
        </form>
        <p class="muted auth-switch"><a href="{{ url_for('main.forgot_password') }}">Request a new link</a></p>
    </div>
</section>
{% endblock %}
